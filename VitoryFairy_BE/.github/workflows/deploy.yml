name: Deploy to EC2

# main 브랜치에 push(= PR merge)되면 자동 배포. UI에서 수동 실행도 가능.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # GHCR 이미지 prefix. github.repository_owner 를 소문자로 변환해 사용.
  REGISTRY: ghcr.io

jobs:
  # 1단계: 모듈 3개 이미지를 GitHub 러너에서 빌드 → GHCR push
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: [user, quiz, create]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        id: vars
        run: echo "prefix=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.module }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            MODULE=${{ matrix.module }}
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/victoryfairy-${{ matrix.module }}:latest
            ${{ steps.vars.outputs.prefix }}/victoryfairy-${{ matrix.module }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}

  # 2단계: EC2에 SSH 접속 → 최신 이미지 pull & 재시작
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (compose 파일 전송용)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app

            # GHCR 로그인 (private 패키지 pull 위해 필요)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 이미지 prefix/tag 주입
            export IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG="${{ github.sha }}"

            # 최신 이미지 받아서 무중단에 가깝게 재기동
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # 안 쓰는 이미지 정리 (디스크 절약)
            docker image prune -f
