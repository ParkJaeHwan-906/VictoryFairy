# EC2 운영용 compose: 이미지를 직접 빌드하지 않고 GHCR에서 받은 이미지를 실행한다.
# (빌드는 GitHub Actions에서 수행)
#
# DB는 AWS RDS 사용 → mysql 컨테이너 없이 .env 의 RDS 주소(DB_HOST)로 접속.
#
# 메모리 전략 (스왑 의존 X):
#   - mem_limit 로 컨테이너별 상한 → 한 앱이 폭주해도 그 컨테이너만 OOM-kill, 호스트는 생존(SSH 유지)
#   - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage 로 힙을 컨테이너 상한에 맞춰 자동 산정
#   - 예산(t3.small 2GB): 앱 3개 × 500m = 1500m + OS/도커/nginx 여유 ~500m
#
# 사용 예) IMAGE_PREFIX=ghcr.io/parkjaehwan-906  IMAGE_TAG=latest  docker compose -f docker-compose.prod.yml up -d
services:
  user:
    image: ${IMAGE_PREFIX}/victoryfairy-user:${IMAGE_TAG:-latest}
    container_name: victoryfairy-user
    restart: unless-stopped
    mem_limit: 500m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}          # RDS 엔드포인트 (.env 에서 주입)
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    # nginx(호스트)에서만 접근 가능하도록 localhost로 한정. 외부 직접 접근 차단.
    ports:
      - "127.0.0.1:8080:8080"

  quiz:
    image: ${IMAGE_PREFIX}/victoryfairy-quiz:${IMAGE_TAG:-latest}
    container_name: victoryfairy-quiz
    restart: unless-stopped
    mem_limit: 500m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8081:8081"

  create:
    image: ${IMAGE_PREFIX}/victoryfairy-create:${IMAGE_TAG:-latest}
    container_name: victoryfairy-create
    restart: unless-stopped
    mem_limit: 500m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8082:8082"
