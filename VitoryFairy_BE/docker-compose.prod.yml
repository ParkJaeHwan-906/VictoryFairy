# EC2 운영용 compose: 이미지를 직접 빌드하지 않고 GHCR에서 받은 이미지를 실행한다.
# (빌드는 GitHub Actions에서 수행)
#
# DB는 AWS RDS 사용 → mysql 컨테이너 없이 .env 의 RDS 주소(DB_HOST)로 접속.
#
# 메모리 전략 (스왑 의존 X):
#   - mem_limit 로 컨테이너별 상한 → 한 앱이 폭주해도 그 컨테이너만 OOM-kill, 호스트는 생존(SSH 유지)
#   - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage 로 힙을 컨테이너 상한에 맞춰 자동 산정
#   - 예산(t3.small 2GB, 실제 스펙은 .claude/modules/infra.md 확인): user 500m + quiz 500m + redis 64m + nginx 128m = 1192m + OS/도커 여유
#     (create 는 주석 처리 상태라 예산 미포함. 되살릴 경우 +500m 로 재계산 필요)
#
# 사용 예) IMAGE_PREFIX=ghcr.io/parkjaehwan-906  IMAGE_TAG=latest  docker compose -f docker-compose.prod.yml up -d
services:
  # 리버스 프록시: 외부 80포트 → 경로별로 각 앱 서비스로 분배 (도커 네트워크 내부에서 서비스명으로 접근)
  nginx:
    image: nginx:1.27-alpine
    container_name: victoryfairy-nginx
    restart: unless-stopped
    mem_limit: 128m
    depends_on:
      - user
      - quiz
#      - create
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # 이메일 인증 코드 저장용. 데이터는 휘발성(TTL 만료)이라 영속 볼륨 없이 컨테이너 재기동 시 초기화되어도 무방.
  # 외부 포트 미개방 — user 컨테이너가 도커 내부 네트워크에서 서비스명(redis)으로만 접근.
  redis:
    image: redis:7.2-alpine
    container_name: victoryfairy-redis
    restart: unless-stopped
    mem_limit: 64m

  user:
    image: ${IMAGE_PREFIX}/victoryfairy-user:${IMAGE_TAG:-latest}
    container_name: victoryfairy-user
    restart: unless-stopped
    mem_limit: 500m
    depends_on:
      - redis
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}          # RDS 엔드포인트 (.env 에서 주입)
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 이메일 인증 실발송(SmtpEmailSender, prod 프로파일 전용) - Brevo SMTP 릴레이.
      # HOST/PORT는 Brevo 고정값이라 하드코딩. USERNAME/PASSWORD는 시크릿이라 .env 에서 주입.
      MAIL_HOST: smtp-relay.brevo.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM:-no-reply@victoryfairy.com}
    # nginx(호스트)에서만 접근 가능하도록 localhost로 한정. 외부 직접 접근 차단.
    ports:
      - "127.0.0.1:8080:8080"

  quiz:
    image: ${IMAGE_PREFIX}/victoryfairy-quiz:${IMAGE_TAG:-latest}
    container_name: victoryfairy-quiz
    restart: unless-stopped
    mem_limit: 500m
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8081:8081"

