# EC2 운영용 compose: 이미지를 직접 빌드하지 않고 GHCR에서 받은 이미지를 실행한다.
# (빌드는 GitHub Actions에서 수행 → t2.micro 1GB RAM에서 OOM 방지)
#
# DB는 AWS RDS 사용 → mysql 컨테이너를 띄우지 않고 .env 의 RDS 주소(DB_HOST)로 접속한다.
# 사용 예) IMAGE_PREFIX=ghcr.io/parkjaehwan-906  IMAGE_TAG=latest  docker compose -f docker-compose.prod.yml up -d
services:
  user:
    image: ${IMAGE_PREFIX}/victoryfairy-user:${IMAGE_TAG:-latest}
    container_name: victoryfairy-user
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}          # RDS 엔드포인트 (.env 에서 주입)
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    # nginx(호스트)에서만 접근 가능하도록 localhost로 한정. 외부 직접 접근 차단.
    ports:
      - "127.0.0.1:8080:8080"

  quiz:
    image: ${IMAGE_PREFIX}/victoryfairy-quiz:${IMAGE_TAG:-latest}
    container_name: victoryfairy-quiz
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8081:8081"

  create:
    image: ${IMAGE_PREFIX}/victoryfairy-create:${IMAGE_TAG:-latest}
    container_name: victoryfairy-create
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8082:8082"
