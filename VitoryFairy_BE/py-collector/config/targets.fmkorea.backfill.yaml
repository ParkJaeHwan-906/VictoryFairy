# FMKorea BACKFILL-only target: date-ordered (newest->oldest) walk.
#
# Purpose: one-shot backfill of a past [from, to] date range via a single
# continuous date-ordered walk (kbo_collector.run.land_community_range). The
# daily cron keeps using config/targets.fmkorea.yaml (order: popular) -- do NOT
# repoint the daily job here.
#
# Why a separate file: the popular sort (sort_index=popular_docs) has no usable
# date order, so it can't walk into the past. Backfill needs the board's default
# recency sort so paging goes strictly newest->oldest and the walk can stop the
# moment it passes `from`.
#
# category=4332282 is the baseball board's KBO category (same board as the daily
# target). sort_index=regdate&order_type=desc = registration date, descending
# (newest first). `order: date` (the default) tells the collector to date-walk
# rather than scan a bounded popular window.
#
# NOTE: this URL's sort params are a design value -- verify the actual paging
# order from a residential IP (FMKorea 430s AWS/datacenter IPs) before a long run.
#
# Run: deploy/local/backfill_fmkorea.sh (residential IP, conservative rate-limit).
targets:
  - { source: FMKOREA, order: date, url: "https://www.fmkorea.com/index.php?mid=baseball&category=4332282&sort_index=regdate&order_type=desc" }
