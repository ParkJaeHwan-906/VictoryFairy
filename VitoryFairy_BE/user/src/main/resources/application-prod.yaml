spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # 초기 테이블 생성 완료 → none 으로 고정(운영 중 스키마 자동 변경 방지).
      # 향후 스키마 변경은 별도 마이그레이션(예: Flyway/수동 DDL)으로 관리.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  web:
    error:
      include-stacktrace: never
