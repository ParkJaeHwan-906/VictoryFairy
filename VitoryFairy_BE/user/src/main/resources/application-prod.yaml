spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # [초기 1회] RDS 가 비어 있어 user 앱에서만 테이블 생성. 생성 확인 후 none 으로 되돌릴 것.
      # (엔티티는 domain 모듈 공용이라 user 한 곳에서만 생성하면 quiz/create 도 같은 테이블 사용)
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  web:
    error:
      include-stacktrace: never
