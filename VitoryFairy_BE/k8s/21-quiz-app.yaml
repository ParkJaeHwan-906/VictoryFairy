# quiz-app: 실시간 채팅/퀴즈 Spring 모듈(:quiz, 컨테이너 포트 8081, 경로 /api/quiz)
#
# 인프라 커플링(ARCHITECTURE §2):
#   quiz 노드그룹 = label workload=quiz  +  taint workload=quiz:NoSchedule
#   -> nodeSelector(스케줄 대상 지정) AND toleration(taint 통과) 둘 다 필요.
#      한쪽만 있으면 파드 Pending.
#
# 스케일 관계(중요):
#   HPA -> 파드 수를 늘린다.  파드가 Pending 되면 -> Cluster Autoscaler 가 quiz 노드그룹에
#   신규 EC2 노드를 붙인다(노드 min2/max8). 즉 HPA는 노드가 아니라 파드를 늘리고,
#   노드 증설은 CA가 담당한다(ARCHITECTURE §2 각주 "부하 분산 = 신규 EC2 노드").
#
# 다중 파드 팬아웃: 실시간 SSE는 파드가 여러 개면 서비스 Redis pub/sub 로 파드 간 이벤트를
#   팬아웃한다(ARCHITECTURE §3). 그래서 세션 어피니티 없이도 수평 확장 안전.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app
  namespace: victoryfairy
  labels:
    app: quiz-app
spec:
  replicas: 2                 # HPA minReplicas와 정합
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      # ── 인프라 커플링: quiz 노드그룹 label 과 정확히 일치 ──
      nodeSelector:
        workload: quiz
      # ── 인프라 커플링: quiz 노드그룹 taint(workload=quiz:NoSchedule) 통과 ──
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "quiz"
          effect: "NoSchedule"
      containers:
        - name: quiz
          # ⚠ 불변 태그(커밋 SHA). latest 금지.
          # TODO: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-quiz 로 교체
          image: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-quiz:<commit-sha>"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: "300m"       # HPA CPU 기준선 -> 이 값 대비 utilization 계산됨
              memory: "512Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
          # actuator 미탑재 -> TCP 프로브(user-app과 동일 이유). TODO: actuator 승격.
          startupProbe:
            tcpSocket: { port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket: { port: 8081 }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8081 }
            periodSeconds: 15
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-app
  namespace: victoryfairy
  labels:
    app: quiz-app
spec:
  type: ClusterIP
  selector:
    app: quiz-app
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
---
# HPA: CPU 기준 파드 오토스케일.
#   minReplicas 2  : 상시 2파드(가용성 + Redis pub/sub 팬아웃 전제)
#   maxReplicas 8  : quiz 노드그룹 노드 max 8 과 정합(노드가 한계면 파드도 결국 여기서 막힘).
#                    ⚠ 파드:노드 = 1:1 가정이 아니라, 노드당 여러 파드 수용 가능하므로 8은
#                       보수적 상한. 실측 후 조정. (노드 max 변경은 terraform-writer 소관)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-app
  namespace: victoryfairy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-app
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # requests.cpu(300m) 대비 평균 60% 넘으면 스케일아웃
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300   # 급격한 축소 방지(채팅 커넥션 보호)
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
