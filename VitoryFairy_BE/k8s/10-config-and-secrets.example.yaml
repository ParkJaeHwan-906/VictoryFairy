# 앱 설정(비밀 아님) + 비밀 참조 예시.
#
# ⚠ 이 파일은 *예시(example)*다. 실제 Secret 평문을 이 레포에 커밋하지 마라.
#   - 권장: External Secrets Operator(AWS SSM Parameter Store / Secrets Manager) 또는
#           CD 파이프라인에서 `kubectl create secret` 주입.
#   - 아래 Secret은 형태만 보여주는 stringData placeholder이며, 실제 배포 시 대체된다.
#
# 값 축(중요): SPRING_PROFILES_ACTIVE=prod 는 *앱 런타임 프로필*이다.
#   Terraform 인프라 environment(dev/prod)와는 다른 축 — 인프라가 dev여도 컨테이너는 prod로 뜬다.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: victoryfairy
data:
  SPRING_PROFILES_ACTIVE: "prod"
  # 데이터 티어는 EKS 밖 EC2(2a). 아래 호스트는 클러스터 내부 DNS(30-external-data.yaml)로 해석된다.
  DB_HOST: "mysql.victoryfairy.svc.cluster.local"
  DB_PORT: "3306"
  DB_NAME: "victoryfairy" # TODO: mysql-ec2 실제 스키마명 확인
  # 서비스 Redis(6379): 채팅/퀴즈 pub-sub 팬아웃 + 이메일 인증 TTL 키 (ARCHITECTURE §3)
  # TODO: 앱(quiz) 설정이 실제로 읽는 프로퍼티 키명과 일치하는지 확인. 현재 BE .env엔 REDIS_* 없음.
  REDIS_HOST: "redis.victoryfairy.svc.cluster.local"
  REDIS_PORT: "6379"
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: victoryfairy
type: Opaque
stringData:
  # TODO: 실제 값은 SSM/Secrets Manager에서 주입. 아래는 placeholder(커밋 금지).
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
