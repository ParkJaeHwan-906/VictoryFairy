# compose nginx(리버스 프록시)용 설정 → 컨테이너로 동작.
# 같은 docker 네트워크라 앱을 서비스명(user/quiz)으로 접근한다.
# (호스트 127.0.0.1 바인딩이 아니라 도커 내부 DNS 사용 → k8s Service 개념과 유사)
# 배치: ~/app/nginx.conf (deploy 단계에서 scp) → 컨테이너의 /etc/nginx/conf.d/default.conf 로 마운트

server {
    listen 80;
    server_name _;            # 도메인 없으면 _ (EC2 퍼블릭 IP로 접근)

    # 원본 요청 정보를 백엔드(스프링)로 전달
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 경로별 라우팅 (컨트롤러 @RequestMapping 과 일치시킬 것)
    location /api/auth {           # user 모듈
        proxy_pass http://user:8080;
    }

    location /api/quiz {           # quiz 모듈
        proxy_pass http://quiz:8081;
    }

    # chat SSE 구독 (GET /api/chat/rooms/{roomUid}/subscribe, text/event-stream)
    # 버퍼링을 켜두면 이벤트가 nginx 버퍼에 쌓여 클라이언트로 흐르지 않으므로 반드시 off.
    # /api/chat prefix 중 subscribe 경로만 분리 적용 (일반 전송/목록/히스토리는 기존 /api/quiz 방식과 동일하게 아래 /api/chat 블록에서 처리).
    location ~ ^/api/chat/rooms/[^/]+/subscribe$ {
        proxy_pass http://quiz:8081;

        # 주의: proxy_set_header 를 이 블록에서 하나라도 지정하면 서버 블록의
        # Host/X-Real-IP/X-Forwarded-For/X-Forwarded-Proto 상속이 통째로 끊긴다 (nginx 특성) → 재선언 필수.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;      # 앱 SseEmitter 타임아웃(30분)보다 여유 있게
    }

    location /api/chat {           # quiz 모듈 (채팅 전송/목록/히스토리 등 일반 요청)
        proxy_pass http://quiz:8081;
    }

    # 헬스체크용 (선택)
    location = /healthz {
        return 200 "ok\n";
    }

    location / {
        return 404;
    }
}
