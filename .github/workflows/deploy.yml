name: Deploy to EC2

# main 브랜치에 push(= PR merge)되면 자동 배포. UI에서 수동 실행도 가능.
# 변경이 감지된 모듈(+ 그에 의존하는 모듈)만 빌드한다.
# 주의: 저장소 루트는 VictoryFairy/ 이고 프로젝트는 VictoryFairy_BE/ 하위에 있다.
on:
  push:
    branches: [main]
    # 배포 산출물에 영향 없는 경로만 바뀐 push 는 워크플로 자체를 건너뛴다.
    # (Claude 하네스 설정/문서 등) — 코드와 섞여 바뀌면 정상 실행된다.
    paths-ignore:
      - 'VictoryFairy_BE/.claude/**'
      - 'VictoryFairy_BE/docs/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PROJECT_DIR: VictoryFairy_BE

jobs:
  # 0단계: 어떤 모듈을 빌드/배포할지 판단 (의존성 그래프 반영)
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.set.outputs.modules }}   # 빌드할 모듈 JSON 배열 (예: ["quiz"])
      deploy: ${{ steps.set.outputs.deploy }}      # 배포 필요 여부 true/false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            common:
              - 'VictoryFairy_BE/common/**'
            domain:
              - 'VictoryFairy_BE/domain/**'
            user:
              - 'VictoryFairy_BE/user/**'
            quiz:
              - 'VictoryFairy_BE/quiz/**'
            create:
              - 'VictoryFairy_BE/create/**'
            root:
              - 'VictoryFairy_BE/build.gradle'
              - 'VictoryFairy_BE/settings.gradle'
              - 'VictoryFairy_BE/gradlew'
              - 'VictoryFairy_BE/gradle/**'
              - 'VictoryFairy_BE/Dockerfile'
              - '.github/workflows/deploy.yml'
            compose:
              - 'VictoryFairy_BE/docker-compose.prod.yml'
              - 'VictoryFairy_BE/nginx.conf'

      - name: Compute build set (dependency graph)
        id: set
        run: |
          set -e
          declare -A want
          all() { want[user]=1; want[quiz]=1; want[create]=1; }

          if [ "${{ github.event_name }}" != "push" ]; then
            # 수동 실행(workflow_dispatch) → 안전하게 전체 빌드
            all
          else
            R='${{ steps.filter.outputs.root }}'
            C='${{ steps.filter.outputs.common }}'
            D='${{ steps.filter.outputs.domain }}'
            U='${{ steps.filter.outputs.user }}'
            Q='${{ steps.filter.outputs.quiz }}'
            CR='${{ steps.filter.outputs.create }}'
            if [ "$R" = "true" ] || [ "$C" = "true" ] || [ "$D" = "true" ]; then
              all                                   # 루트/공통 변경 → 전체
            else
              [ "$U" = "true" ]  && { want[user]=1; want[quiz]=1; }  # quiz 가 user 의존
              [ "$Q" = "true" ]  && want[quiz]=1
              [ "$CR" = "true" ] && want[create]=1
            fi
          fi

          mods=$(printf '%s\n' "${!want[@]}" | sort | jq -R 'select(length>0)' | jq -cs .)
          [ -z "$mods" ] && mods='[]'
          echo "modules=$mods" >> "$GITHUB_OUTPUT"

          # 빌드할 모듈이 있거나 compose 가 바뀌었으면 배포 수행
          if [ "$mods" != "[]" ] || [ "${{ steps.filter.outputs.compose }}" = "true" ] || [ "${{ github.event_name }}" != "push" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
          echo "→ build modules = $mods"

  # 1단계: 변경된 모듈만 빌드 → GHCR push
  build-and-push:
    needs: detect
    if: needs.detect.outputs.modules != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set lowercase image prefix
        id: vars
        run: echo "prefix=${REGISTRY}/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.module }}
        uses: docker/build-push-action@v7
        with:
          context: ./${{ env.PROJECT_DIR }}
          file: ./${{ env.PROJECT_DIR }}/Dockerfile
          build-args: |
            MODULE=${{ matrix.module }}
          push: true
          tags: |
            ${{ steps.vars.outputs.prefix }}/victoryfairy-${{ matrix.module }}:latest
            ${{ steps.vars.outputs.prefix }}/victoryfairy-${{ matrix.module }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}

  # 2단계: EC2에 SSH 접속 → 최신(latest) 이미지 pull & 변경분만 재기동
  deploy:
    needs: [detect, build-and-push]
    # 배포가 필요하고(모듈 빌드 or compose 변경), 빌드가 실패하지 않았을 때만
    if: ${{ !cancelled() && needs.detect.outputs.deploy == 'true' && needs.build-and-push.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (compose 파일 전송용)
        uses: actions/checkout@v5

      - name: Copy compose & nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "${{ env.PROJECT_DIR }}/docker-compose.prod.yml,${{ env.PROJECT_DIR }}/nginx.conf"
          strip_components: 1   # VictoryFairy_BE/ 접두사 제거 → ~/app/{docker-compose.prod.yml,nginx.conf}
          target: ~/app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # latest 태그 기반: 바뀐 모듈만 새 이미지로 갱신되고, 안 바뀐 모듈은 기존 유지
            export IMAGE_PREFIX="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            export IMAGE_TAG=latest

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
