# EC2 호스트 nginx → 도커 컨테이너 리버스 프록시 설정
# 배치 위치: /etc/nginx/conf.d/victoryfairy.conf
# (Amazon Linux nginx는 /etc/nginx/nginx.conf 의 http{} 안에서 conf.d/*.conf 를 include 함)

# ── 백엔드(업스트림) 정의: 컨테이너가 호스트에 매핑한 포트 ──
upstream user_app   { server 127.0.0.1:8080; }
upstream quiz_app   { server 127.0.0.1:8081; }

server {
    listen 80;
    server_name _;            # 도메인 없으면 _ (모든 요청 매칭, EC2 퍼블릭 IP로 접근)

    # 프록시 시 원본 요청 정보를 백엔드로 전달 (스프링이 실제 클라이언트 IP/프로토콜을 알게 함)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── 경로별 라우팅 ──
    # 주의: 컨트롤러의 @RequestMapping 경로와 일치시켜야 함.
    #       모듈에 컨트롤러를 추가하면 location 도 맞춰서 늘리면 됨.

    location /api/auth {           # user 모듈: 로그인/회원가입 등
        proxy_pass http://user_app;
    }

    location /api/quiz {           # quiz 모듈 (컨트롤러 추가되면 사용)
        proxy_pass http://quiz_app;
    }

    # 그 외 경로는 명시적으로 막음 (원하면 404 대신 기본 앱으로 보내도 됨)
    location / {
        return 404;
    }
}
