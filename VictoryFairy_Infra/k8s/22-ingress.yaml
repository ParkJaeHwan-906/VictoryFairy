# ALB Ingress: AWS Load Balancer Controller 가 이 Ingress 를 보고 실제 ALB 를 만든다.
#   host/path -> ClusterIP Service(user-app / quiz-app).
#   경로는 nginx.conf(compose)의 라우팅과 동일: /api/auth -> user-app, /api/quiz -> quiz-app
#
# 전제(모두 Terraform 으로 프로비저닝됨):
#   - LBC IRSA 역할 (modules/alb) + LBC Helm 설치 (runbook) → IngressClass "alb"
#   - 퍼블릭 서브넷 태그 kubernetes.io/role/elb=1 (modules/network) → LBC 가 서브넷 자동 탐색
#   - ACM 인증서 (modules/dns) → LBC 가 host(victoryfairy.com)로 인증서 자동 탐색 → HTTPS 종료
#   - ExternalDNS (k8s/23-external-dns.yaml) → 아래 host 를 보고 A(ALIAS)→ALB 레코드 자동 생성
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: victoryfairy
  namespace: victoryfairy
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443' # 80 → 443 자동 리다이렉트
    # HTTPS(TLS) 인증서: 어노테이션을 생략하면 LBC 가 아래 host(victoryfairy.com)와 도메인이
    #   일치하는 ACM 인증서를 자동 탐색해 붙인다(modules/dns 가 발급). 명시하려면 주석 해제:
    # alb.ingress.kubernetes.io/certificate-arn: <terraform output acm_certificate_arn>
    #
    # 헬스체크: ⚠ 대상 파드가 이 경로에서 200 을 반환해야 타깃이 Healthy → 라우팅된다.
    #   현재 user/quiz 앱에 헬스 엔드포인트가 없으면 503 이 뜬다(runbook의 '헬스체크' 참고).
    #   actuator 도입 시 /actuator/health 로 교체.
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/group.name: victoryfairy
spec:
  ingressClassName: alb
  rules:
    - host: victoryfairy.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: user-app
                port:
                  number: 80
          - path: /api/quiz
            pathType: Prefix
            backend:
              service:
                name: quiz-app
                port:
                  number: 80
