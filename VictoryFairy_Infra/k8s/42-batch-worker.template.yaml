# 배치 워커 Job 템플릿 (크롤 / 정제 / 생성) — 뼈대 (ARCHITECTURE §4)
#
# ⚠ 이 파일은 *템플릿*이다. 단계별(crawl/refine/generate) Job을 실제로 생성하는 주체는
#   오케스트레이터(미결정: 경량 컨트롤러 vs Argo)다. 여기서는 워커 컨테이너의 골격과
#   인프라 커플링/환경만 확정한다. 스트리밍 트리거 로직 자체는 미구현(완성된 척하지 않음).
#
# 파이프라인(스트리밍, 단계가 겹쳐 흐름):
#   crawl   : 소스별 fan-out -> s3://.../raw/ (파일 1개=1건). 크롤러가 batch-redis INCR raw_count
#             (중복은 SADD seen <키> 0반환으로 차단).
#   refine  : raw_count >= N 이면 기동. clean/ 에 JSON 배열 저장. 담은 레코드 수 M 만큼 INCRBY clean_count M.
#   generate: clean_count >= N 이면 기동. Claude API로 문제 생성 -> 최종 MySQL(quiz) 저장.
#   * 처리 단위는 파일. 처리한 파일은 done/ 으로 이동해 멱등 보장(카운터는 기동 신호일 뿐).
#
# 접근 경계(반드시 지킴):
#   - 최종 저장은 데이터 EC2 MySQL 3306 만 (Service: mysql.victoryfairy-batch, 30-external-data.yaml).
#   - 카운터는 batch-redis:6379 (임시). 서비스 Redis(6379)는 접근하지 않는다.
#   - S3 raw/clean/done + Claude API.
#
# 멱등/재시도: Spot 노드에서 돌므로 언제든 회수될 수 있다. backoffLimit 재시도 + done/ 이동으로
#   중복 처리를 차단(멱등)한다.
#
# TODO(인프라 요청 -> terraform-writer 보고 대상):
#   - S3 접근용 IRSA(IAM Role for ServiceAccount): raw/clean/done 버킷 read/write.
#   - batch 노드 전용 SG를 쓸 경우 데이터 EC2 3306 인입에 batch SG 허용(ARCHITECTURE 미결정 §77).
# TODO(앱): 워커 이미지(crawl/refine/generate). :create 모듈이 '생성' 단계에 해당할 수 있음 — 확인 필요.
#   Claude API 키는 Secret/SSM 주입(평문 금지).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: batch-worker-crawl          # 예시(crawl). refine/generate는 STAGE/이미지 바꿔 복제.
  namespace: victoryfairy-batch
  labels:
    app: batch-worker
    stage: crawl
spec:
  backoffLimit: 3                   # 멱등 전제 재시도(Spot 회수 대비)
  completions: 1
  parallelism: 1                    # TODO: crawl은 소스별 fan-out이면 parallelism/Indexed 조정
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: batch-worker
        stage: crawl
    spec:
      restartPolicy: Never
      # serviceAccountName: batch-runner  # S3 IRSA 부여 시 사용
      # ── 인프라 커플링: batch 노드그룹 label + taint ──
      nodeSelector:
        workload: batch
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "batch"
          effect: "NoSchedule"
      containers:
        - name: worker
          # TODO: 워커 이미지로 교체. latest 금지(불변 태그).
          image: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-batch-worker:<commit-sha>"
          env:
            - name: STAGE
              value: "crawl"        # crawl | refine | generate
            # 배치 카운터 = 배치 전용 임시 Redis (서비스 Redis 아님)
            - name: BATCH_REDIS_HOST
              value: "batch-redis.victoryfairy-batch.svc.cluster.local"
            - name: BATCH_REDIS_PORT
              value: "6379"
            # 최종 저장 = 데이터 EC2 MySQL 3306 (배치 네임스페이스 external service)
            - name: DB_HOST
              value: "mysql.victoryfairy-batch.svc.cluster.local"
            - name: DB_PORT
              value: "3306"
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"          # 앱 런타임 프로필(인프라 env와 별개 축)
            # TODO: S3 버킷/prefix(raw,clean,done), 트리거 임계치 N, Claude API 키(Secret 주입)
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
