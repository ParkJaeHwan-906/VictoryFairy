# user-app: 인증/유저 Spring 모듈(:user, 컨테이너 포트 8080, 경로 /api/auth)
#
# 인프라 커플링(설계 변경 2026-07 — user·quiz 공용 app 노드풀):
#   app 노드그룹 = label workload=app, taint 없음. user·quiz 파드가 같은 노드에 동거.
#   -> nodeSelector 만으로 스케줄. toleration 불필요.
# 파드 규모: 기본 1 → 트래픽 증가 시 HPA 가 최대 2 (파일 하단 HPA 참조).
#   ⚠ 단일 파드 구간에서는 파드 재시작 시 잠깐 중단될 수 있음(dev 감수, 운영 시 min 2 권장).
# 노드 자원이 차면 Cluster Autoscaler 가 app 노드풀을 수평 확장(min1/max4).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-app
  namespace: victoryfairy
  labels:
    app: user-app
spec:
  replicas: 1 # HPA minReplicas 와 정합(기본 1)
  # 블루-그린식 업데이트: 신버전 파드 '전체'를 먼저 띄우고(maxSurge 100%),
  # 구버전은 신버전이 Ready 될 때까지 하나도 내리지 않는다(maxUnavailable 0).
  # readiness 프로브 통과 → 트래픽 전환 → 구버전 종료. 실패 시 구버전이 그대로 서비스.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  revisionHistoryLimit: 10 # 롤백용 이전 ReplicaSet 보관(kubectl rollout undo)
  selector:
    matchLabels:
      app: user-app
  template:
    metadata:
      labels:
        app: user-app
    spec:
      # ── 인프라 커플링: app 공용 노드그룹 label 과 정확히 일치 ──
      nodeSelector:
        workload: app
      containers:
        - name: user
          # ⚠ 불변 태그(커밋 SHA). latest 금지.
          # TODO: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-user 로 교체
          image: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-user:<commit-sha>"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          # SPRING_PROFILES_ACTIVE=prod 는 app-config에서 주입(앱 런타임 프로필, 인프라 env와 별개 축)
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"   # compose mem_limit 500m 대비 여유. MaxRAMPercentage=70 로 힙 산정.
          # 프로브: 현재 :user 모듈에 actuator 의존성이 없어 HTTP health 엔드포인트가 없다.
          #   -> TCP 소켓 프로브로 대체. TODO: spring-boot-starter-actuator 추가 후
          #      /actuator/health/{liveness,readiness} 로 승격 권장.
          startupProbe:
            tcpSocket: { port: 8080 }
            failureThreshold: 30
            periodSeconds: 5      # JVM 콜드스타트 최대 ~150s 허용
          readinessProbe:
            tcpSocket: { port: 8080 }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8080 }
            periodSeconds: 15
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: user-app
  namespace: victoryfairy
  labels:
    app: user-app
spec:
  type: ClusterIP
  selector:
    app: user-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# HPA: 기본 1 파드 → CPU 부하 시 최대 2 (설계: user 파드 상한 2)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-app
  namespace: victoryfairy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-app
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60 # requests.cpu(250m) 대비 평균 60% 초과 시 스케일아웃
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # 급격한 축소 방지
