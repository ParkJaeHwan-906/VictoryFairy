# quiz-app: 실시간 채팅/퀴즈 Spring 모듈(:quiz, 컨테이너 포트 8081, 경로 /api/quiz)
#
# 인프라 커플링(설계 변경 2026-07 — user·quiz 공용 app 노드풀):
#   app 노드그룹 = label workload=app, taint 없음. user·quiz 파드가 같은 노드에 동거.
#   -> nodeSelector 만으로 스케줄. toleration 불필요(taint 격리 제거됨).
#
# 스케일 관계(중요):
#   HPA -> 파드 수를 늘린다(max 4).  파드가 Pending 되면 -> Cluster Autoscaler 가
#   app 노드풀에 신규 EC2 노드를 붙인다(노드 min1/max4). 즉 HPA는 노드가 아니라
#   파드를 늘리고, 노드 증설은 CA가 담당한다.
#
# 다중 파드 팬아웃: 실시간 SSE는 파드가 여러 개면 서비스 Redis pub/sub 로 파드 간 이벤트를
#   팬아웃한다(ARCHITECTURE §3). 그래서 세션 어피니티 없이도 수평 확장 안전.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-app
  namespace: victoryfairy
  labels:
    app: quiz-app
spec:
  replicas: 1                 # HPA minReplicas와 정합(기본 1)
  selector:
    matchLabels:
      app: quiz-app
  template:
    metadata:
      labels:
        app: quiz-app
    spec:
      # ── 인프라 커플링: app 공용 노드그룹 label 과 정확히 일치 ──
      nodeSelector:
        workload: app
      containers:
        - name: quiz
          # ⚠ 불변 태그(커밋 SHA). latest 금지.
          # TODO: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-quiz 로 교체
          image: "<ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/victoryfairy-quiz:<commit-sha>"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          resources:
            requests:
              cpu: "300m"       # HPA CPU 기준선 -> 이 값 대비 utilization 계산됨
              memory: "512Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
          # actuator 미탑재 -> TCP 프로브(user-app과 동일 이유). TODO: actuator 승격.
          startupProbe:
            tcpSocket: { port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket: { port: 8081 }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8081 }
            periodSeconds: 15
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-app
  namespace: victoryfairy
  labels:
    app: quiz-app
spec:
  type: ClusterIP
  selector:
    app: quiz-app
  ports:
    - name: http
      port: 80
      targetPort: 8081
      protocol: TCP
---
# HPA: CPU 기준 파드 오토스케일.
#   minReplicas 1  : 기본 1파드(유휴 자원 절약 — dev). ⚠ 단일 파드 구간 재시작 시 잠깐 중단 가능,
#                    운영 진입 시 2로 상향 권장(가용성 + Redis pub/sub 팬아웃 전제)
#   maxReplicas 4  : 설계 상한(user 2 + quiz 4 파드가 app 공용 노드풀에 동거).
#                    노드 자원이 차면 CA가 app 노드풀(min1/max4)을 수평 확장.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quiz-app
  namespace: victoryfairy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quiz-app
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # requests.cpu(300m) 대비 평균 60% 넘으면 스케일아웃
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300   # 급격한 축소 방지(채팅 커넥션 보호)
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
